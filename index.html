<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="blog-preview-card-main/assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Blog preview card</title>



</head>

<body>
  <main>
    <article class="blog-card">

      <img src="blog-preview-card-main/assets/images/illustration-article.svg"
        alt="An abstract black and yellow illustration featuring a closing HTML tag inside a stylized shape"
        class="blog-card__image">

      <span class="blog-card__badge">Learning</span>

      <time datetime="2023-12-21" class="blog-card__date">Published 21 Dec 2023</time>

      <a href="https://www.sabaoon.dev/courses/html-css-foundations">
        <h1 class="blog-card__title">HTML & CSS foundations</h1>
      </a>

      <p class="blog-card__paragraph">These languages are the backbone of every website, defining structure, content,
        and
        presentation.</p>
      <div class="blog-card__Greg__name__image">
        <img src="blog-preview-card-main/assets/images/image-avatar.webp" alt="Avatar of Greg Hooper"
          class="blog-card__Greg_image">
        <span class="blog-card__username">Greg Hooper</span>
      </div>
    </article>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="https://github.com/jovermer-frontend">jovermer-frontend</a>.
  </footer>

</body>

</html>
